query Footer {
  viewer {
    fontCollections(onlyRoots: true, first: 20) {
      edges {
        node {
          id
          name
          collectionType
          url
          isNew
          opticalAdjustment
          fontStyles {
            name
          }
          slug {
            name
          }
          featureStyle {
            cssFamily
            name
            webfontSources {
              format
              url
            }
            family {
                colors
              }
          }
        }
      }
    }
    pages(first: 4) {
      edges {
        node {
          id
          title
          slug {
            name
          }
        }
      }
    }
    settings {
      title
      footerText(format: HTML)
      htmlHead
      faviconMarkup
      uiFontStyle {
        name
        cssFamily
        webfontSources {
          url
          format
        }
      }
    }
  }
}
