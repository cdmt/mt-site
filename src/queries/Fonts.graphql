fragment FontDetailCollection on FontCollection {
  id
  name
  collectionType
  isVariableFont
  cssUrl
  sku {
    id
  }
  bundles {
    sku {
      id
    }
  }
  fontStyles {
    name
    cssFamily
    cssWeight
    cssStyle
    sku {
      id
    }
    variableInstances {
      name
      coordinates {
        axis
        value
      }
    }
  }
  colors
  isNew
}

fragment FontDetail on FontCollection {
  ...FontDetailCollection
  shortDescription
  description
  designYear
  designers {
    name
  }
  glyphGroups {
    name
  }
  languages
  pdfs {
    url
    thumbnailUrl
    name
  }
  featureStyle {
    cssFamily
    glyphNames {
      name
    }
    name
    supportedLanguages
    webfontSources {
      format
    }
    family {
      cssUrl
    }
  }
  children(collectionTypes: [FAMILY]) {
    ...FontDetailCollection
  }
  images {
    url
    description
    meta {
      mimeType
      width
      height
    }
  }
  minisiteLink
}

query Font($slug: String!) {
  viewer {
    slug(name: $slug) {
      fontCollection {
        ...FontDetail
        pageMetadata {
          title
          description
          keywords
        }
      }
    }
  }
}